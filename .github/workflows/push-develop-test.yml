name: Tests

on:
  pull_request: 
    branches:
      - develop

jobs:
  test-back:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Run tests
        working-directory: backend
        run: npm install && npm test
