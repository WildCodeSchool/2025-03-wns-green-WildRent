services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: sh -c "npm run prod"
    ports:
      - "4200:4200"
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      JWT_SECRET: ${JWT_SECRET}
      

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    command: sh -c "npm run build"
    depends_on:
      - backend

  database:
    image: postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER} 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./persist/database:/var/lib/postgresql

  nginx:
    image: nginx:1.21.3
    depends_on:
      - backend
      - frontend
    restart: always
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      # - web-client-build:/web-client-build
      - ./logs:/var/log/nginx
      
volumes:
  postgres-data: