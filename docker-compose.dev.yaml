services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "npm run build && npm run prod"
    ports:
      - "4200:4200"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend/src/:/app/src/
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      JWT_SECRET: ${JWT_SECRET}
      

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    command: sh -c "npm run dev"
    volumes:
    - ./frontend:/app
    - /app/node_modules
      # - web-client-build:/app
    depends_on:
      - backend

  database:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER} 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./persist/database:/var/lib/postgresql

