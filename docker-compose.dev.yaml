services:
  backend:
    build: ./backend
    ports:
      - "3001:3000"
    volumes:
        - ./backend/src/:/app/src/
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}

  frontend:
    build: ./frontend 
    ports:
      - "2001:2000"

  database:
      image: postgres
      ports:
        - "4001:4000"
      environment:
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_HOST: ${DB_HOST} 
      volumes:
          - ./database:/var/lib/postgresql/data

     